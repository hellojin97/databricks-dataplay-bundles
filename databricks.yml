# yaml-language-server: $schema=./bundle_config_schema.json
bundle:
  name: dataplay-bundles

# Python(pydabs) 으로 정의된 리소스 진입점 — `resources/__init__.py` 의 `load_resources`.
# `venv_path` 는 uv 가 만든 `.venv` 를 가리켜 DAB CLI 가 databricks-bundles 를 import 한다.
python:
  venv_path: .venv
  resources:
    - "resources:load_resources"

# YAML 정의도 함께 머지 — example_job.yml, configuration/catalogs.yml 등.
include:
  - resources/*.yml
  - resources/**/*.yml
  - configuration/*.yml
  - configuration/**/*.yml

targets:
  lab:
    mode: development
    default: true
    # mode:development 의 (a) 스케줄 자동 일시정지, (b) UC schema 이름에 dev prefix 부여를 해제
    # → wikimedia_recentchanges 잡의 */5 cron 이 실제 동작하고 schema 이름이 `bronze` 그대로 유지된다.
    presets:
      trigger_pause_status: UNPAUSED
      skip_name_prefix_for_schema: true
    workspace:
      host: https://adb-7405613177889652.12.azuredatabricks.net/
