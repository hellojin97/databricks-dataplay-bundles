name: Bundle Deploy
on:
    push:
        branches: [main]
        paths:
            - "databricks.yml"
            - "resources/**"
            - "src/**"
            - "configuration/**"
            - "pyproject.toml"
            - "uv.lock"
            - "bundle_config_schema.json"
            - ".github/workflows/bundle-deploy.yml"
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

concurrency:
    group: bundle-deploy
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DATABRICKS_AUTH_TYPE: azure-cli
            # 참고: deployment engine 은 databricks.yml 의 bundle.engine=direct 로 명시 (env 보다 우선).
        steps:
            - uses: actions/checkout@v4
            - uses: azure/login@v2
              with:
                  client-id:            ${{ vars.AZURE_CLIENT_ID }}
                  tenant-id:            ${{ vars.AZURE_TENANT_ID }}
                  subscription-id:      ${{ vars.AZURE_SUBSCRIPTION_ID }}
            # pydabs Job 정의를 평가하려면 .venv (databricks-bundles 포함) 필요.
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - uses: astral-sh/setup-uv@v3
              with:
                  enable-cache: true
            - run: uv sync --frozen
            - uses: databricks/setup-cli@main
            # 일회성: 이전 terraform 엔진 state 를 청소. direct 엔진으로 새 state 를 생성하기 위해 필요.
            # 본 step 은 다음 deploy 성공 후 별도 commit 으로 제거 예정.
            - run: databricks bundle destroy --auto-approve --target lab
            - run: databricks bundle validate --target lab
            - run: databricks bundle deploy --target lab
            - name: Notify Discord
              uses: sarisia/actions-status-discord@v1
              if: always()
              with:
                  webhook: ${{ secrets.DATABRICKS_BUNDLES_DISCORD_WEBHOOK_URL }}
                  title: Databricks Bundle Deploy