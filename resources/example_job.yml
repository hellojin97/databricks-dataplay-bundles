# yaml-language-server: $schema=../bundle_config_schema.json
resources:
  jobs:
    example_job:
      name: example_job
      tasks:
        - task_key: hello
          spark_python_task:
            python_file: ../src/example.py
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "1"