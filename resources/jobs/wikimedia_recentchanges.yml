# yaml-language-server: $schema=../../bundle_config_schema.json
resources:
  jobs:
    wikimedia_recentchanges:
      name: wikimedia_recentchanges
      # 매 5분 정각(초 0) 자동 트리거 — Databricks 는 Quartz 6-field cron 사용.
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      # 1 슬롯 = 1 인스턴스. 멱등이지만 동시 실행은 API rate limit 보호상 금지.
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest
          spark_python_task:
            # 모듈 형태로 실행하기 위해 -m 대신 파일 경로 사용. 본 파일은 호출부만 담당.
            python_file: ../../src/dataplay/jobs/wikimedia_recentchanges.py
            parameters:
              - "--wiki-api-url"
              - "https://en.wikipedia.org/w/api.php"
              - "--wiki-id"
              - "en.wikipedia"
              - "--volume-root"
              - "/Volumes/wikimedia-dataplay/bronze/recentchanges_raw"
              - "--user-agent"
              - "dataplay-bundles/0.1 (https://github.com/hellojin97/databricks-dataplay-bundles; contact@example)"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - "requests>=2.32,<3"
              - "pydantic>=2.7,<3"
      # 잡 단위 이메일/Discord 알림은 별도 PR (US3, P3 — research.md R8).
      email_notifications:
        on_failure: []
